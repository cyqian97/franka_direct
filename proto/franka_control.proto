syntax = "proto3";

package franka_control;

service FrankaControl {
    // Set desired joint positions (7 doubles in radians)
    rpc SetJointTarget   (JointTarget)   returns (CommandResult);
    // Set desired end-effector pose (4x4 col-major, 16 doubles)
    rpc SetEETarget      (EETarget)      returns (CommandResult);
    // Set desired gripper opening width
    rpc SetGripperTarget (GripperTarget) returns (CommandResult);
    // Read current robot + gripper state
    rpc GetRobotState    (Empty)         returns (RobotState);
    // Move robot to a joint configuration (blocks until complete)
    rpc ResetToJoints    (JointResetTarget) returns (CommandResult);
    // Stop the control loop gracefully
    rpc Stop             (Empty)         returns (CommandResult);
}

message Empty {}

message JointTarget {
    // 7 joint positions in radians
    repeated double q = 1;
}

message EETarget {
    // 4x4 homogeneous transform, column-major (16 doubles)
    // Same layout as libfranka O_T_EE
    repeated double pose = 1;
}

message GripperTarget {
    // Desired opening width [m], range [0, 0.08]
    double width = 1;
    // Max speed [m/s], range [0.01, 0.2]; 0 → use default (0.1 m/s)
    double speed = 2;
}

message JointResetTarget {
    // 7 joint angles in radians
    repeated double q = 1;
    // Speed factor [0..1]; 0 → use default (0.3)
    double speed = 2;
    // Max duration in seconds; 0 → use default (5.0)
    double max_duration = 3;
}

message RobotState {
    // ── Fields originally in this proto ──────────────────────────────────────
    repeated double pose          = 1;   // O_T_EE col-major (16) — actual measured EEF pose
    repeated double q             = 2;   // measured joint positions (7) [rad]
    double cmd_success_rate       = 3;   // libfranka control_command_success_rate [0,1]
    bool   ready                  = 4;   // true once arm control loop is running
    string error                  = 5;   // non-empty if fatal error
    repeated double target_q      = 6;   // server interpolated joint command (7) [rad]
    double gripper_width          = 7;   // actual gripper opening [m]
    bool   gripper_grasping       = 8;   // true while gripping
    repeated double target_pose   = 9;   // (unused — always empty)
    repeated double dq            = 10;  // measured joint velocities (7) [rad/s]

    // ── Full libfranka RobotState fields ──────────────────────────────────────
    repeated double O_T_EE_d               = 11;  // last desired EEF pose, col-major (16)
    repeated double q_d                    = 12;  // desired joint positions (7) [rad]
    repeated double dq_d                   = 13;  // desired joint velocities (7) [rad/s]
    repeated double ddq_d                  = 14;  // desired joint accelerations (7) [rad/s²]
    repeated double tau_J                  = 15;  // measured link-side joint torques (7) [Nm]
    repeated double tau_J_d                = 16;  // desired joint torques w/o gravity (7) [Nm]
    repeated double dtau_J                 = 17;  // torque derivative (7) [Nm/s]
    repeated double tau_ext_hat_filtered   = 18;  // filtered external torque estimate (7) [Nm]
    repeated double O_F_ext_hat_K          = 19;  // estimated external wrench in base frame (6) [N,Nm]
    repeated double K_F_ext_hat_K          = 20;  // estimated external wrench in stiffness frame (6) [N,Nm]
    repeated double joint_contact          = 21;  // contact level per joint (7)
    repeated double cartesian_contact      = 22;  // contact level per Cartesian dim (6)
    repeated double joint_collision        = 23;  // collision level per joint (7)
    repeated double cartesian_collision    = 24;  // collision level per Cartesian dim (6)
    repeated double theta                  = 25;  // motor positions (7) [rad]
    repeated double dtheta                 = 26;  // motor velocities (7) [rad/s]
    repeated double elbow                  = 27;  // elbow config: [joint3_pos, flip_dir] (2)
    int32           robot_mode             = 28;  // RobotMode enum: 0=Other,1=Idle,2=Move,3=Guiding,4=Reflex,5=UserStopped,6=AutoErrorRecovery
    double          time_s                 = 29;  // robot timestamp [s], monotonically increasing
}

message CommandResult {
    bool   success = 1;
    string message = 2;
}
