# Cartesian velocity server PD controller parameters.
# Edit this file and restart the server to apply changes (no rebuild needed).
#
# The server computes Cartesian velocity commands from EE pose error:
#   v_x = kp_x * (px_desired - px_current) - kd_x * vx_current
#   v_y = kp_y * (py_desired - py_current) - kd_y * vy_current
#   v_z = kp_z * (pz_desired - pz_current) - kd_z * vz_current
#   v_rot = kp_rot * rot_error              - kd_rot * w_current
#
# rot_error is the axis-angle vector from R_desired * R_current^T.
# Velocity is clamped to max_lin_vel / max_rot_vel before sending to libfranka.
# libfranka's internal joint impedance controller handles the rest.

# -- Linear PD gains (per-axis) -----------------------------------------------
# If kp_x/y/z are set, they override kp_lin for that axis.
# If omitted, the axis falls back to kp_lin (same for kd).

# Fallback gains (used for any axis not explicitly set)
kp_lin: 10.0 # set to 15 can cause acceleration_discontinuity, safe to set to 10
kd_lin: 0.5

# Per-axis overrides (uncomment to tune individually)
# kp_x: 3.0
# kp_y: 3.0
# kp_z: 3.0
# kd_x: 0.5
# kd_y: 0.5
# kd_z: 0.5

# -- Orientation PD gains -----------------------------------------------------
kp_rot: 2.0 # set to 3 can cause acceleration_discontinuity, safe to set to 2
kd_rot: 0.3

# -- Velocity limits ----------------------------------------------------------
# Maximum linear velocity [m/s]
# Franka FR3 max Cartesian velocity is ~1.7 m/s.  Keep conservative for safety.
max_lin_vel: 0.5

# Maximum angular velocity [rad/s]
# Franka FR3 max end-effector rotation rate is ~2.5 rad/s.
max_rot_vel: 2.5

# Maximum velocity change rate (acceleration clamp) [m/s² and rad/s²].
# Limits how fast the velocity command can change between consecutive 1 kHz
# ticks.  Prevents large jumps when a new SetEETarget arrives suddenly.
max_lin_accel: 5.0
max_rot_accel: 10.0

# -- Initial joint pose -------------------------------------------------------
# If init_q is set, the server moves the robot to this joint configuration
# using a smooth cosine-interpolated joint position motion BEFORE entering
# the Cartesian velocity control loop.  If omitted, the server starts from
# wherever the robot currently is.
#
# Values are the 7 joint angles in radians (comma-separated).
# The default below is the standard Franka "home" configuration.
# init_speed is a fraction of max joint velocity (0 = frozen, 1 = full speed).
#
# Uncomment to enable:
# init_q: 0, -0.785, 0, -2.356, 0, 1.571, 0.785
# init_speed: 0.3
# init_duration: 5.0

# -- Velocity ramp -------------------------------------------------------------
# On entering robot.control(), the PD output is multiplied by a cosine ramp
# from 0 to 1 over this period (avoids acceleration discontinuity at startup).
# On stop, velocity ramps back down to zero before setting motion_finished.
ramp_duration: 0.5

# libfranka internal velocity low-pass filter cutoff [Hz]
# Applied to the CartesianVelocities output by libfranka.
# Lower = smoother but more latency.  100 = almost no filtering.
cutoff_freq: 100.0

# -- Gripper -------------------------------------------------------------------
gripper_force:   20.0
gripper_eps_in:  0.08
gripper_eps_out: 0.08
