# franka_direct teleoperation configuration
# Edit this file and run: python scripts/simple_teleop_direct_torque.py --config config/teleop.yaml

# Language instruction stored with every recorded episode
task: ""

# Output directory for HDF5 episodes
data_dir: data

# Robot gRPC server
host: 192.168.1.6
port: 50052

# Control loop frequency (Hz)
hz: 15

# VR controller
left_controller: false
spatial_coeff: 3.0        # position delta multiplier (larger = faster arm motion)

# IK solver parameters
ik:
  max_lin_delta: 0.075    # max EEF translation per control step [m]
  max_rot_delta: 0.15     # max EEF rotation per control step [rad]
  max_joint_delta: 0.2    # max per-joint position change per step [rad]
  max_gripper_delta: 0.25 # max gripper delta per step (normalisation only)
  control_hz: 15          # must match top-level hz

# Skip robot reset to home on startup
no_reset: false

# Reset motion parameters
reset:
  speed:      0.2      # joint-space motion speed passed to reset_to_joints
  randomize:  true    # apply random EEF noise on each reset
  noise:
    pos_low:  [-0.10, -0.20, -0.10]   # x, y, z lower bound [m]
    pos_high: [ 0.10,  0.20,  0.10]   # x, y, z upper bound [m]
    rot_low:  [-0.30, -0.30, -0.30]   # roll, pitch, yaw lower bound [rad]
    rot_high: [ 0.30,  0.30,  0.30]   # roll, pitch, yaw upper bound [rad]

# Gripper parameters
gripper:
  open_m:    0.08    # Franka Hand max opening [m]
  speed:     0.1     # finger speed [m/s] — sent to server; actual speed set in controller.yaml
  deadband:  0.002   # min width change [m] required to issue a new gripper command

# ZED camera settings (set enabled: true to record camera data)
camera:
  enabled: false
  serial0: null            # null = auto-detect first ZED camera
  serial1: null            # null = auto-detect second ZED camera
  fps: 15
  resolution: HD720        # HD2K | HD1080 | HD720 | VGA
  depth: false             # also record depth images (float32, metres)
  preview: true            # show live OpenCV preview windows while teleoperating
